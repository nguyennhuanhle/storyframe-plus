<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Storyframe</title>
<link rel="stylesheet" href="/static/style.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>">
</head>
<body>

<div class="decor" aria-hidden="true">
  <svg class="cloud c1" viewBox="0 0 120 60"><ellipse cx="35" cy="38" rx="30" ry="20"/><ellipse cx="65" cy="30" rx="28" ry="24"/><ellipse cx="90" cy="40" rx="24" ry="18"/><rect x="20" y="40" width="80" height="18" rx="9"/></svg>
  <svg class="cloud c2" viewBox="0 0 120 60"><ellipse cx="35" cy="38" rx="30" ry="20"/><ellipse cx="65" cy="30" rx="28" ry="24"/><ellipse cx="90" cy="40" rx="24" ry="18"/><rect x="20" y="40" width="80" height="18" rx="9"/></svg>
  <svg class="cloud c3" viewBox="0 0 120 60"><ellipse cx="35" cy="38" rx="30" ry="20"/><ellipse cx="65" cy="30" rx="28" ry="24"/><ellipse cx="90" cy="40" rx="24" ry="18"/><rect x="20" y="40" width="80" height="18" rx="9"/></svg>
  <svg class="star s1" viewBox="0 0 24 24"><path d="M12 2l2.9 6.3L22 9.3l-5 4.8 1.2 6.9L12 17.8 5.8 21l1.2-6.9-5-4.8 7.1-1z"/></svg>
  <svg class="star s2" viewBox="0 0 24 24"><path d="M12 2l2.9 6.3L22 9.3l-5 4.8 1.2 6.9L12 17.8 5.8 21l1.2-6.9-5-4.8 7.1-1z"/></svg>
  <svg class="star s3" viewBox="0 0 24 24"><path d="M12 2l2.9 6.3L22 9.3l-5 4.8 1.2 6.9L12 17.8 5.8 21l1.2-6.9-5-4.8 7.1-1z"/></svg>
  <svg class="star s4" viewBox="0 0 24 24"><path d="M12 2l2.9 6.3L22 9.3l-5 4.8 1.2 6.9L12 17.8 5.8 21l1.2-6.9-5-4.8 7.1-1z"/></svg>
</div>

<header>
  <div class="header-inner">
    <div class="logo-lockup">
      <div class="logo-mark">
        <svg viewBox="0 0 48 48"><path d="M24 12c-4-3-9-3.5-14-2v26c5-1.5 10-1 14 2 4-3 9-3.5 14-2V10c-5-1.5-10-1-14 2z" fill="#fff" opacity=".95"/><path d="M24 12v28" stroke="#c9b8ff" stroke-width="2" stroke-linecap="round"/><path d="M31 6l1.8 3.8L37 10.4l-3 2.9.8 4.2L31 15.6 27.2 17.5l.8-4.2-3-2.9 4.2-.6z" fill="#ffd84d"/></svg>
      </div>
      <h1>Storyframe</h1>
    </div>
    <p class="tagline" data-i18n="tagline">Biến video đọc truyện thành sách PDF + file nghe MP3 — mọi thứ chạy trên máy của bạn</p>
    <div class="header-actions">
      <button id="lang-toggle" class="lang-btn" title="Language">🌐 English</button>
      <button id="guide-btn" class="guide-btn" data-i18n="guide.btn">📖 Hướng dẫn sử dụng</button>
    </div>
    <div id="system-banner" class="hidden"></div>
  </div>
</header>

<main>
  <section class="card new-job">
    <h2><span class="h2-icon">☁️</span> <span data-i18n="newjob.title">Thêm video mới</span></h2>

    <div class="source-row">
      <div class="input-wrap">
        <span class="input-icon">🔗</span>
        <input id="source-input" type="text" data-i18n-ph="input.placeholder"
               placeholder="Dán link YouTube vào đây..." autocomplete="off">
      </div>
      <span class="or-text" data-i18n="or">hoặc</span>
      <button id="upload-btn" class="btn-file" data-i18n-title="file.title" title="Chọn file video trên máy">
        <span>📁</span> <span data-i18n="file.btn">Chọn file</span>
      </button>
      <input id="file-input" type="file" accept="video/*,.mkv,.webm,.avi,.m4v,.mov,.mpg,.mpeg" hidden>
    </div>
    <div id="upload-status" class="hint hidden"></div>

    <div class="options-row">
      <label class="option">
        <span data-i18n="caption.label">Chữ truyện trên màn hình?</span>
        <select id="caption-mode">
          <option value="force" data-i18n="caption.force" selected>Video KHÔNG có chữ (tự tạo phụ đề)</option>
          <option value="off" data-i18n="caption.off">Video CÓ chữ trên màn hình</option>
          <option value="auto" data-i18n="caption.auto">Không chắc — tự phát hiện</option>
        </select>
      </label>
      <label class="option toggle">
        <input id="fast-mode" type="checkbox" checked>
        <span class="toggle-text">
          <b data-i18n="fast.title">Chế độ nhanh</b>
          <small data-i18n="fast.hint">(khuyên dùng — tận dụng phụ đề YouTube và bộ nhớ đệm)</small>
        </span>
      </label>
    </div>

    <details class="advanced">
      <summary><span class="gear">⚙️</span> <span data-i18n="advanced.summary">Cài đặt nâng cao</span></summary>
      <div class="options-row">
        <label class="option">
          <span data-i18n="cookies.label">Lấy cookies từ trình duyệt <small>(khi YouTube đòi đăng nhập)</small></span>
          <select id="cookies-browser">
            <option value="" data-i18n="cookies.none" selected>Không dùng</option>
            <option value="chrome">Chrome</option>
            <option value="edge">Edge</option>
            <option value="firefox">Firefox</option>
          </select>
        </label>
        <label class="option toggle">
          <input id="keep-work" type="checkbox">
          <span class="toggle-text"><b data-i18n="keepwork">Giữ file tạm để gỡ lỗi</b></span>
        </label>
      </div>
    </details>

    <button id="start-btn" class="btn-start">
      <span class="start-star">⭐</span>
      <span id="start-label" data-i18n="start.btn">Bắt đầu xử lý</span>
      <span class="start-rocket">🚀</span>
    </button>
    <div id="submit-error" class="error-box hidden"></div>
  </section>

  <section id="jobs-section">
    <h2 id="jobs-heading" class="hidden"><span class="h2-icon">📋</span> <span data-i18n="jobs.heading">Danh sách xử lý</span></h2>
    <div id="jobs-list"></div>
  </section>
</main>

<footer>
  <p data-i18n="footer.note">Chỉ xử lý video mà bạn có quyền tải và sử dụng. Toàn bộ dữ liệu được xử lý ngay trên máy này.</p>
</footer>

<div id="guide-modal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-head">
      <h2 data-i18n="guide.title">📖 Hướng dẫn sử dụng Storyframe</h2>
      <button id="guide-close" class="modal-close" title="Close">✕</button>
    </div>
    <div class="guide-content" id="guide-content"></div>
  </div>
</div>

<script src="/static/app.js"></script>
</body>
</html>
