name: Build installer

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 0.3.0)"
        required: true
        default: "0.3.0"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          if ($env:GITHUB_REF -like "refs/tags/*") {
            $v = $env:GITHUB_REF -replace "refs/tags/v", ""
          } else {
            $v = "${{ github.event.inputs.version }}"
          }
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Building version $v"

      - name: Build installer + portable
        shell: pwsh
        run: ./packaging/build.ps1 -Version ${{ steps.ver.outputs.version }} -Clean

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: storyframe-windows
          path: packaging/dist/*
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: packaging/dist/*
          generate_release_notes: true
